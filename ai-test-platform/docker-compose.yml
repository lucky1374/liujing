version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ai_test_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ai-test-network

  redis:
    image: redis:7-alpine
    container_name: ai-test-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-test-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-test-app
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=root123
      - DB_DATABASE=ai_test_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3000:3000"
    depends_on:
      - mysql
      - redis
    networks:
      - ai-test-network
    volumes:
      - ./src:/app/src

volumes:
  mysql_data:
  redis_data:

networks:
  ai-test-network:
    driver: bridge
